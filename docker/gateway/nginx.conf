# Use Docker's embedded DNS so upstream hostnames are re-resolved at request
# time (with a 10s cache) instead of being pinned to whatever IP a container
# had when nginx booted. Without this, recreating any backend container leaves
# the gateway returning 502 against a stale IP until the gateway is restarted.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 8000;
    server_name _;

    # Must match MAX_UPLOAD_MB=100 (admin multer + ingest sidecar), plus a
    # little headroom for multipart encoding overhead.
    client_max_body_size 105m;

    # Shared proxy headers (inherited by all location blocks)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API — pass through unchanged (admin-app handles /api/* routes)
    location /api/ {
        set $admin_upstream admin-app:3001;
        proxy_pass http://$admin_upstream;
    }

    # Admin SPA — pass through to admin-app (serves SPA at /admin/)
    location /admin/ {
        set $admin_upstream admin-app:3001;
        proxy_pass http://$admin_upstream;
    }

    location = /admin {
        return 301 /admin/;
    }

    # OGC API — pass through to tipg (tipg configured with TIPG_ROOT_PATH=/ogc)
    location /ogc/ {
        set $tipg_upstream tipg:8000;
        proxy_pass http://$tipg_upstream;
    }

    location = /ogc {
        return 301 /ogc/;
    }

    # Map client SPA — catch-all (must be last)
    location / {
        set $map_upstream map-client:80;
        proxy_pass http://$map_upstream;
    }
}
