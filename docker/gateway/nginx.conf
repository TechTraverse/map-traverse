upstream map_client {
    server map-client:80;
}

upstream admin_app {
    server admin-app:3001;
}

upstream tipg {
    server tipg:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 5m;

    # Shared proxy headers (inherited by all location blocks)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API — pass through unchanged (admin-app handles /api/* routes)
    location /api/ {
        proxy_pass http://admin_app;
    }

    # Admin SPA — pass through to admin-app (serves SPA at /admin/)
    location /admin/ {
        proxy_pass http://admin_app;
    }

    location = /admin {
        return 301 /admin/;
    }

    # OGC API — pass through to tipg (tipg configured with TIPG_ROOT_PATH=/ogc)
    location /ogc/ {
        proxy_pass http://tipg;
    }

    location = /ogc {
        return 301 /ogc/;
    }

    # Map client SPA — catch-all (must be last)
    location / {
        proxy_pass http://map_client;
    }
}
