name: Publish Container Images

on:
  push:
    branches: [main]

jobs:
  publish-containers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: map-admin
            file: apps/admin-app/Dockerfile
            build-args: "VITE_BASE_PATH=/admin/"
          - image: map-client
            file: apps/map-client/Dockerfile
            build-args: ""
          - image: map-gateway
            file: docker/gateway/Dockerfile
            build-args: ""
          - image: map-ingest
            file: apps/ingest-service/Dockerfile
            build-args: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./packages/map-ui-lib/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/ogc-maps/${{ matrix.image }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.file }}
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/ogc-maps/${{ matrix.image }}:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: 'true'
          limit-severities-for-sarif: 'true'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.image }}
