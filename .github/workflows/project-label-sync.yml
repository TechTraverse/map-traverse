name: Sync Project Status to Labels

# Bridges GitHub Projects with the Claude agent workflow (claude.yml).
# Runs on a short schedule and when manually triggered. Checks the
# project board for status changes and applies matching labels.
#
# Why not projects_v2_item? That event is a webhook-only event and is
# not available as a GitHub Actions trigger.
#
# Requires:
#   - PROJECT_NUMBER set to your GitHub Projects board number
#   - A PAT with project:read and issues:write scopes stored as
#     PROJECT_TOKEN (GITHUB_TOKEN can't read org projects)
#   - The project's Status field values must match the keys in the
#     statusToLabel map below (Clarify, Ready, In Progress, In Review)

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch: {}

env:
  PROJECT_NUMBER: 2
  ORG: ogc-maps

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const statusToLabel = {
              'Clarify': 'status:clarify',
              'Ready': 'status:ready',
              'In Progress': 'status:in-progress',
              'In Review': 'status:in-review',
            };
            const allStatusLabels = Object.values(statusToLabel);

            // Fetch project items with their Status field and linked content
            const query = `query($org: String!, $number: Int!) {
              organization(login: $org) {
                projectV2(number: $number) {
                  items(first: 100) {
                    nodes {
                      fieldValueByName(name: "Status") {
                        ... on ProjectV2ItemFieldSingleSelectValue { name }
                      }
                      content {
                        ... on Issue {
                          number
                          repository { name, owner { login } }
                          labels(first: 20) {
                            nodes { name }
                          }
                        }
                        ... on PullRequest {
                          number
                          repository { name, owner { login } }
                          labels(first: 20) {
                            nodes { name }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }`;

            const result = await github.graphql(query, {
              org: process.env.ORG,
              number: parseInt(process.env.PROJECT_NUMBER),
            });

            const items = result.organization.projectV2.items.nodes;

            for (const item of items) {
              const content = item.content;
              if (!content?.number) continue;

              const owner = content.repository.owner.login;
              const repo = content.repository.name;
              const issue_number = content.number;
              const currentLabels = (content.labels?.nodes || []).map(l => l.name);
              const currentStatusLabels = currentLabels.filter(l => allStatusLabels.includes(l));

              const status = item.fieldValueByName?.name;
              const expectedLabel = statusToLabel[status];

              // Skip if labels already match
              const hasExpected = expectedLabel && currentStatusLabels.includes(expectedLabel);
              const hasOnlyExpected = currentStatusLabels.length === (expectedLabel ? 1 : 0);
              if (hasExpected && hasOnlyExpected) continue;
              if (!expectedLabel && currentStatusLabels.length === 0) continue;

              // Remove stale status labels
              for (const label of currentStatusLabels) {
                if (label !== expectedLabel) {
                  await github.rest.issues.removeLabel({
                    owner, repo, issue_number, name: label
                  }).catch(() => {});
                }
              }

              // Add the correct label
              if (expectedLabel && !currentStatusLabels.includes(expectedLabel)) {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number, labels: [expectedLabel]
                });
                console.log(`#${issue_number}: applied ${expectedLabel}`);
              }
            }
