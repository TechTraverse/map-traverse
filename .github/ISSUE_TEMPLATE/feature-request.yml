name: Feature Request
description: Suggest a new feature or improvement. All ideas welcome — you don't need to be technical.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We'd love to hear your idea. Focus on the **problem** you're trying
        to solve — we'll figure out the best way to build it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: |
        Describe the pain point or gap. What are you trying to do that you can't
        do today, or what's harder than it should be?
      placeholder: |
        Example: "When I'm configuring map layers, I have to manually look up
        the OGC collection IDs from the API. It would be faster if the UI
        showed a searchable list."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: What would a good solution look like?
      description: |
        Describe your ideal outcome. This can be as simple as "I want a button
        that does X" or as detailed as a technical design — whatever feels natural.
      placeholder: |
        Example: "A dropdown in the layer config panel that fetches available
        collections from the OGC API and lets me search/filter by name."
    validations:
      required: true

  - type: dropdown
    id: user-type
    attributes:
      label: I would describe myself as
      description: This helps us write the right level of documentation and design the right UX.
      options:
        - End user — I use the map application
        - Developer — I build with these components
        - DevOps / Infra — I deploy and maintain the stack
        - Other
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: How will we know it's done?
      description: |
        In plain language, what does success look like? Describe the
        behavior you expect to see — not how to build it. Our agent will
        turn this into a technical checklist during triage.
      placeholder: |
        Example:
        - I can see a searchable list of collections in the layer config panel.
        - Typing filters the list as I type.
        - Picking one fills in the collection ID automatically.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or workarounds you've tried
      description: Have you found a way around this? Knowing what you've tried helps us understand the gap.
      placeholder: |
        Example: "Right now I open a separate browser tab and hit the
        /collections endpoint directly, then copy-paste the ID."
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Anything else?
      description: Mockups, screenshots of similar tools, links to relevant specs, etc.
    validations:
      required: false
