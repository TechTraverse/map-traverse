services:
  postgis:
    image: postgis/postgis:16-3.4-alpine
    container_name: storybook-components-postgis
    environment:
      POSTGRES_DB: gis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54322:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  tipg:
    image: ghcr.io/developmentseed/tipg:latest
    container_name: storybook-components-tipg
    depends_on:
      postgis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgis:5432/gis"
      TIPG_DB_MAX_CONN_SIZE: "10"
      TIPG_SET_MVT_LAYERNAME: "true"
    ports:
      - "8001:8000"
    command: uvicorn tipg.main:app --host 0.0.0.0 --port 8000

  seed:
    build:
      context: ./docker/seed
      dockerfile: Dockerfile
    container_name: storybook-components-seed
    depends_on:
      postgis:
        condition: service_healthy
    environment:
      PGHOST: postgis
      PGPORT: 5432
      PGDATABASE: gis
      PGUSER: postgres
      PGPASSWORD: postgres
    volumes:
      - ./docker/seed:/scripts
    command: sh /scripts/seed.sh

volumes:
  postgis_data:
