services:
  postgis:
    image: postgis/postgis:16-3.4-alpine
    container_name: storybook-components-postgis
    environment:
      POSTGRES_DB: gis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  tipg:
    image: ghcr.io/developmentseed/tipg:latest
    container_name: storybook-components-tipg
    depends_on:
      postgis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgis:5432/gis"
      TIPG_DB_MAX_CONN_SIZE: "10"
      TIPG_SET_MVT_LAYERNAME: "true"
      TIPG_DB_SCHEMAS: '["example"]'
    ports:
      - "8000:8000"
    command: uvicorn tipg.main:app --host 0.0.0.0 --port 8000

  seed:
    build:
      context: ./docker/seed
      dockerfile: Dockerfile
    container_name: storybook-components-seed
    depends_on:
      postgis:
        condition: service_healthy
    environment:
      PGHOST: postgis
      PGPORT: 5432
      PGDATABASE: gis
      PGUSER: postgres
      PGPASSWORD: postgres
    volumes:
      - ./docker/seed:/scripts
    command: sh /scripts/seed.sh

  admin-app:
    build:
      context: .
      dockerfile: apps/admin-app/Dockerfile
    container_name: storybook-components-admin-app
    depends_on:
      postgis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgis
      DB_PORT: 5432
      DB_NAME: gis
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 3001
      SESSION_SECRET: change-me-in-production
      CORS_ORIGINS: http://localhost:3000
      # Set ADMIN_USERNAME and ADMIN_PASSWORD_HASH to enable authentication
      # ADMIN_USERNAME: admin
      # ADMIN_PASSWORD_HASH: <bcrypt hash>
    ports:
      - "3001:3001"

  map-client:
    build:
      context: .
      dockerfile: apps/map-client/Dockerfile
      args:
        VITE_CONFIG_API_URL: http://localhost:3001
    container_name: storybook-components-map-client
    depends_on:
      tipg:
        condition: service_started
      seed:
        condition: service_completed_successfully
    ports:
      - "3000:80"

volumes:
  postgis_data:
