services:
  postgis:
    image: postgis/postgis:16-3.4-alpine
    container_name: storybook-components-postgis
    environment:
      POSTGRES_DB: gis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  tipg:
    image: ghcr.io/developmentseed/tipg:latest
    container_name: storybook-components-tipg
    depends_on:
      postgis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgis:5432/gis"
      TIPG_DB_MAX_CONN_SIZE: "10"
      TIPG_SET_MVT_LAYERNAME: "true"
      TIPG_DB_SCHEMAS: '${TIPG_DB_SCHEMAS:-["example","uploads"]}'
      TIPG_CORS_ORIGIN: '*'
      TIPG_ROOT_PATH: /ogc
      TIPG_DEBUG: 'TRUE'
    ports:
      - "8000:8000"
    command: uvicorn tipg.main:app --host 0.0.0.0 --port 8000

  seed:
    build:
      context: ./docker/seed
      dockerfile: Dockerfile
    container_name: storybook-components-seed
    depends_on:
      postgis:
        condition: service_healthy
    environment:
      PGHOST: postgis
      PGPORT: 5432
      PGDATABASE: gis
      PGUSER: postgres
      PGPASSWORD: postgres
    volumes:
      - ./docker/seed:/scripts
      - ./GISData:/GISData:ro
    command: sh /scripts/seed.sh

  ingest:
    build:
      context: .
      dockerfile: apps/ingest-service/Dockerfile
    container_name: storybook-components-ingest
    depends_on:
      postgis:
        condition: service_healthy
    environment:
      INGEST_DB_HOST: postgis
      INGEST_DB_PORT: 5432
      INGEST_DB_NAME: gis
      INGEST_DB_USER: postgres
      INGEST_DB_PASSWORD: postgres
      INGEST_MAX_MB: "100"
      INGEST_MAX_CONCURRENCY: "2"
      PORT: 8081
    # Internal-only service (not exposed through the gateway). Expose the port
    # locally for debugging if needed.
    ports:
      - "8081:8081"

  admin-app:
    build:
      context: .
      dockerfile: apps/admin-app/Dockerfile
      args:
        VITE_BASE_PATH: /admin/
    develop:
      watch:
        - action: sync
          path: apps/admin-app
          target: /app
          ignore:
            - node_modules/
            - .git/
            - .env
            - .env.local
    container_name: storybook-components-admin-app
    depends_on:
      postgis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
      ingest:
        condition: service_started
    environment:
      DB_HOST: postgis
      DB_PORT: 5432
      DB_NAME: gis
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 3001
      SESSION_SECRET: change-me-in-production
      SPA_BASE_PATH: /admin/
      CORS_ORIGINS: http://localhost:3000,http://localhost
      INGEST_SERVICE_URL: http://ingest:8081
      MAX_UPLOAD_MB: "100"
      # Set ADMIN_USERNAME and ADMIN_PASSWORD_HASH to enable authentication
      # ADMIN_USERNAME: admin
      # ADMIN_PASSWORD_HASH: <bcrypt hash>
    ports:
      - "3001:3001"

  map-client:
    build:
      context: .
      dockerfile: apps/map-client/Dockerfile
    develop:
      watch:
        - action: sync
          path: apps/map-client
          target: /app
          ignore:
            - node_modules/
            - .git/
            - .env
            - .env.local
    container_name: storybook-components-map-client
    depends_on:
      tipg:
        condition: service_started
      seed:
        condition: service_completed_successfully
    ports:
      - "3000:80"

  gateway:
    image: nginx:alpine
    container_name: storybook-components-gateway
    depends_on:
      - admin-app
      - map-client
      - tipg
    ports:
      - "80:80"
    volumes:
      - ./docker/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgis_data:
